name: Render documents with rmarkdown-action
on: [push]
jobs:
  render:
    name: Render my calendar regressors
    runs-on: ubuntu-latest
    env:
      GH_PAT: ${{ secrets.GITHUB_TOKEN }}
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies for R packages
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcairo2-dev \
            libpng-dev \
            libjpeg-dev \
            libcurl4-openssl-dev \
            libharfbuzz-dev \
            libfribidi-dev \
            libtiff5-dev \
            libfontconfig1-dev \
            libfreetype6-dev \
            pkg-config \
            protobuf-compiler \
            libprotobuf-dev \
            libprotoc-dev

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - uses: r-lib/actions/setup-r@v2

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-tinytex@v2

      - name: Install ubuntu deps
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install libcurl4-openssl-dev
          sudo apt-get install -y libuv1-dev

      - name: Install display dependencies
        run: Rscript -e 'install.packages(c("rmarkdown", "flextable", "kableExtra"), repos = "http://cran.us.r-project.org")'

      - name: Install tidyverse dependencies
        run: Rscript -e 'install.packages(c("magrittr", "purrr", "haven", "lubridate", "dplyr", "tidyr", "stringr"), repos = "http://cran.us.r-project.org")'

      - name: Install ts dependencies
        run: Rscript -e 'install.packages(c("zoo", "remotes", "rjd3toolkit"), repos = "http://cran.us.r-project.org")'

      - name: Render document
        run: Rscript ./doc/render.R

      - name: Commit result
        run: |
          git config --local user.name "$GITHUB_ACTOR"
          git config --local user.email "$GITHUB_ACTOR@users.noreply.github.com"
          git add -A
          git commit -am "Sheets built!" || echo "No changes to commit"
          git push origin || echo "No change to push !"
