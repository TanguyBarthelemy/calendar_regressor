name: Render documents with rmarkdown-action
on: [push]
jobs:
  render:
    name: Render my calendar regressors
    runs-on: ubuntu-latest
    env:
      GH_PAT : ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-tinytex@v2

      - name: Install libcurl4
        run: |
          sudo apt install libcurl4-openssl-dev
          sudo apt install libharfbuzz-dev libfribidi-dev libtiff5-dev

      - name: Install dependencies
        run: Rscript -e 'install.packages(c("rmarkdown", "flextable"), repos = "http://cran.us.r-project.org")'

      - name: Render document
        run: Rscript ./doc/render.R

      - name: Commit result
        run: |
          git config --local user.name "$GITHUB_ACTOR"
          git config --local user.email "$GITHUB_ACTOR@users.noreply.github.com"
          git add -A
          git commit -am "Sheets built!" || echo "No changes to commit"
          git push origin || echo "No change to push !"
